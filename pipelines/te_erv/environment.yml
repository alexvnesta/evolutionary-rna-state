# Conda environment for the TE / ERV activation subworkflow (osx-arm64 native).
#
#   - bowtie2 / samtools / subread : native osx-arm64 bioconda builds
#   - bowtie2 is Telescope's documented multimap aligner (Bendall et al. 2019).
#         It REPLACES the original STAR pass: the only osx-arm64 conda build of
#         STAR 2.7.11b ingests 0 reads (see pipelines/scripts/run_rnaseq.sh), so
#         STAR is unusable on this machine. bowtie2 -k 100 --very-sensitive-local
#         retains the multimappers Telescope's EM needs.
#   - TEtranscripts (TEcount)   : installed via PIP, not conda. The bioconda
#         tetranscripts package (noarch) hard-depends on `bioconductor-deseq`
#         (the legacy DESeq), which has NO osx-arm64 build and breaks the arm64
#         solve. That R package is only used by the `TEtranscripts` differential-
#         expression command; this workflow calls only `TEcount` (pure
#         Python + pysam counting), so the PyPI wheel (`pysam` its sole dep) is
#         sufficient and avoids the arm64 blocker entirely.
#   - Telescope (locus-level)   : NO osx-arm64 conda build exists
#         (bioconda telescope is osx-64/linux-64 only; the PyPI telescope-ngs
#          wheel is x86 py36). Built from source via pip against the conda-
#          provided numpy/scipy/pysam/cython — pure-Python + one Cython
#          extension, compiles cleanly on arm64 with the conda c-compiler.
#
# Channels order matters: conda-forge first, then bioconda.
name: te_erv
channels:
  - conda-forge
  - bioconda
dependencies:
  - python=3.10
  # --- aligners / BAM handling (native arm64) ---
  - bioconda::bowtie2=2.5.4           # Telescope's documented multimap aligner (arm64-native)
  - bioconda::samtools=1.21
  - bioconda::subread=2.0.8           # featureCounts (available if a raw-count fallback is needed)
  # --- shared / Telescope build+runtime deps (all arm64-available) ---
  - conda-forge::numpy=1.26.4
  - conda-forge::scipy=1.11.4
  - bioconda::pysam=0.23.3            # >=0.23.3 required by htseq 2.0.5
  - bioconda::htseq=2.0.5
  - conda-forge::intervaltree=3.1.0
  - conda-forge::pyyaml=6.0.1
  - conda-forge::future=1.0.0
  - conda-forge::cython=0.29.36
  - conda-forge::c-compiler                # provides clang for the Cython ext
  - pip
  - pip:
      # Family-level TEcount — PyPI wheel (dep: pysam only), avoids the
      # bioconductor-deseq arm64 blocker in the conda tetranscripts package.
      - "TEtranscripts==2.2.4"
      # Locus-level EM reassignment. Build from source (mlbendall main, v1.0.3),
      # linking the conda numpy/cython above.
      - "git+https://github.com/mlbendall/telescope.git@main"
