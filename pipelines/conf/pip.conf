# pip config for the sandbox's TLS-terminating proxy.
# The proxy intercepts HTTPS to PyPI (which IS allowlisted) with a cert the
# conda envs' pip cannot verify -> SSLCertVerificationError (macOS OSStatus
# -26276). PyPI + the wheel host are trusted here to skip that proxy-cert
# verification (the hosts themselves are already network-allowlisted, so this
# does not widen network access — it only accepts the proxy's cert).
[global]
trusted-host =
    pypi.org
    files.pythonhosted.org
    pypi.python.org
